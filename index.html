<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothing Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

header{
    text-align:center;
    padding:20px;
    font-size:24px;
    background:#111827;
}

.admin{
    background:#111827;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:5px;
    background:#1f2937;
    color:white;
}

button{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.add{
    background:green;
    color:white;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:220px;
    background:#111827;
    margin:10px;
    border-radius:10px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.card p{
    margin:10px;
    color:#9ca3af;
}

.buy{
    background:#22c55e;
    color:white;
    margin:10px;
}
</style>
</head>

<body>

<header>clothing dz</header>

<div class="admin">
<h3>Admin Panel ➕</h3>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="img" placeholder="Image URL">

<button class="add" onclick="addProduct()">Add Product</button>
</div>

<div class="container" id="products"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
    {name:"T-Shirt", price:"1500 DA", img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
    {name:"Hoodie", price:"3500 DA", img:"https://images.unsplash.com/photo-1520975958225-3f61d6b0f5d0"}
];

function save(){
    localStorage.setItem("products", JSON.stringify(products));
}

function render(){
    let box = document.getElementById("products");
    box.innerHTML = "";

    products.forEach(p=>{
        box.innerHTML += 
        <div class="card">
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button class="buy" onclick="order('${p.name}')">Buy on WhatsApp</button>
        </div>;
    });
}

function addProduct(){
    let n = document.getElementById("name").value;
    let p = document.getElementById("price").value;
    let i = document.getElementById("img").value;

    if(n==""  p==""  i==""){
        alert("Fill all fields!");
        return;
    }

    products.push({name:n, price:p, img:i});
    save();
    render();
}

function order(name){
    let number = "213000000000";
    let msg = "I want to order: " + name;
    let url = "https://wa.me/" + number + "?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
}

render();

</script>

</body>
</html>
