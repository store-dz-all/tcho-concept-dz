<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCHO-CONCEPT store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: white;
}

/* HEADER */
header {
    background: #0f172a;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2937;
}

header h1 {
    font-size: 20px;
    color: #facc15;
}

button {
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px;
    background: radial-gradient(circle,#111827,#0b0f1a);
}

.hero h2 {
    font-size: 32px;
}

.hero p {
    color: #94a3b8;
}

/* PRODUCTS */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111827;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.3s;
    border: 1px solid #1f2937;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card h3 {
    margin: 10px;
}

.price {
    color: #22c55e;
    margin: 0 10px;
    font-weight: bold;
}

/* BUTTONS */
.buy-btn {
    width: 90%;
    margin: 10px;
    padding: 8px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 6px;
}

.add-btn {
    background: #3b82f6;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 6px;
}

/* ADMIN */
.admin {
    background: #0f172a;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
    border: 1px solid #1f2937;
}

input {
    padding: 8px;
    margin: 5px;
    width: 200px;
    border-radius: 5px;
    border: none;
}
</style>
</head>

<body>

<header>
    <h1>🔥 Luxury Store</h1>
</header>

<section class="hero">
    <h2>Premium Fashion Store</h2>
    <p>Buy the best clothes with style & luxury design</p>
</section>

<section class="container" id="products"></section>

<section class="admin">
    <h2>Admin Panel ➕ Add Product</h2><br>

    <input id="name" placeholder="Product name">
    <input id="image" placeholder="Image URL">
    <input id="price" placeholder="Price">

    <button class="add-btn" onclick="addProduct()">Add Product</button>
</section>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

// render products
function render() {
    let box = document.getElementById("products");
    box.innerHTML = "";

    products.forEach((p,i) => {
        box.innerHTML += 
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>
            <button class="buy-btn" onclick="buy(${i})">Buy Now 🛒</button>
        </div>;
    });
}

// add product
function addProduct() {
    let name = document.getElementById("name").value;
    let image = document.getElementById("image").value;
    let price = document.getElementById("price").value;

    if(!name  !image  !price){
        alert("Fill all fields");
        return;
    }

    products.push({name,image,price});
    localStorage.setItem("products", JSON.stringify(products));

    document.getElementById("name").value = "";
    document.getElementById("image").value = "";
    document.getElementById("price").value = "";

    render();
}

// buy button
function buy(i){
    alert("🛒 Added to cart: " + products[i].name);
}

render();
</script>

</body>
</html>
