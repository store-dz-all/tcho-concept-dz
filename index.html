<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0a0f1c;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    background:#111827;
    border-bottom:1px solid #1f2937;
}

nav h1{
    color:#facc15;
}

nav button{
    background:#3b82f6;
    border:none;
    padding:8px 12px;
    color:white;
    border-radius:6px;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
    background:linear-gradient(135deg,#111827,#0a0f1c);
}

.hero h2{
    font-size:34px;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:#111827;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #1f2937;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.price{
    margin:0 10px;
    color:#22c55e;
    font-weight:bold;
}

.card button{
    width:90%;
    margin:10px;
    padding:8px;
    border:none;
    background:#22c55e;
    color:white;
    border-radius:6px;
}

/* ADMIN PANEL */
.admin{
    position:fixed;
    top:0;
    right:-350px;
    width:300px;
    height:100%;
    background:#0f172a;
    border-left:2px solid #1f2937;
    padding:20px;
    transition:0.3s;
}

.admin.active{
    right:0;
}

input{
    width:100%;
    margin:5px 0;
    padding:8px;
    border:none;
    border-radius:5px;
}

.add{
    background:#3b82f6;
    color:white;
    padding:10px;
    border:none;
    width:100%;
    margin-top:10px;
    border-radius:6px;
}

.close{
    background:red;
    margin-top:10px;
}
</style>
</head>

<body>

<nav>
    <h1>🔥 Fashion Store</h1>
    <button onclick="toggleAdmin()">Admin Panel</button>
</nav>

<section class="hero">
    <h2>Luxury Clothing Store</h2>
    <p>Modern fashion, premium style</p>
</section>

<section class="products" id="products"></section>

<!-- ADMIN PANEL -->
<div class="admin" id="admin">
    <h2>Admin Panel</h2>

    <input id="name" placeholder="Product name">
    <input id="image" placeholder="Image URL">
    <input id="price" placeholder="Price">

    <button class="add" onclick="addProduct()">Add Product</button>
    <button class="add close" onclick="toggleAdmin()">Close</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

// show products
function render(){
    let box = document.getElementById("products");
    box.innerHTML = "";

    products.forEach((p,i)=>{
        box.innerHTML += 
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>
            <button onclick="buy(${i})">Buy Now 🛒</button>
        </div>;
    });
}

// add product
function addProduct(){
    let name = document.getElementById("name").value;
    let image = document.getElementById("image").value;
    let price = document.getElementById("price").value;

    if(!name  !image  !price){
        alert("Fill all fields");
        return;
    }

    products.push({name,image,price});
    localStorage.setItem("products",JSON.stringify(products));

    render();
}

// buy
function buy(i){
    alert("🛒 Added: " + products[i].name);
}

// admin toggle
function toggleAdmin(){
    document.getElementById("admin").classList.toggle("active");
}

render();
</script>

</body>
</html>
